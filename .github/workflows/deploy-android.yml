name: 🚀 Deploy Android QA Build

# Triggers:
#   - Manual: run from any feature branch to deploy a QA build
#   - Automatic: push to main/master deploys the "Sefaria Staging" app
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  android-deploy:
    runs-on: ubuntu-latest   # Android builds don't need macOS — faster & cheaper

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        # gcloud is used by get_or_create_firebase_app.sh to authenticate
        # and call the Firebase Management API

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          # 'bundler' tells setup-ruby to read the Ruby version from Gemfile.lock,
          # keeping CI consistent with the version used to generate the lockfile.
          ruby-version: 'bundler'
          bundler-cache: true

      - name: Install npm dependencies
        run: npm install

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | base64 --decode > android/upload-kstore.keystore

      - name: Decode Firebase service account
        # Sets GOOGLE_APPLICATION_CREDENTIALS so get_or_create_firebase_app.sh
        # can authenticate with gcloud. The script activates the account itself —
        # no separate gcloud auth call needed here.
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" \
            | base64 --decode > /tmp/firebase-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json" >> $GITHUB_ENV

      - name: Create envvars.sh
        run: |
          echo "export SOURCE_SERVER=\"https://readonly.sefaria.org/\""  >> scripts/envvars.sh
          echo "export SOURCE_UNIX_PATH=\"static/android-export/\""      >> scripts/envvars.sh

      - name: List keystore (debug info)
        working-directory: android
        run: |
          echo "PWD = $(pwd)"
          file upload-kstore.keystore || true
          keytool -list -v \
            -keystore upload-kstore.keystore \
            -storepass "${{ secrets.STOREPASS }}" \
          || true

      - name: Run Fastlane
        working-directory: android
        run: |
          bundle exec fastlane android testrelease storepass:${{ secrets.STOREPASS }}

      - name: Commit version bump
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle
          if git diff --cached --quiet; then
            echo "No version bump detected; skipping commit"
          else
            # tr removes spaces and Windows-style \r that awk may leave on the value
            NEW=$(grep "^def VERSION_BUILD" android/app/build.gradle \
              | awk -F'=' '{print $2}' | tr -d ' \r')
            git commit -m "ci: bump Android versionCode to $NEW [skip ci]"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/firebase-service-account.json android/upload-kstore.keystore

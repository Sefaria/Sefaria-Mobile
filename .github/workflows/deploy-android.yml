name: 🚀 Deploy Android QA Build

# Triggers:
#   - Manual: run from any feature branch to deploy a QA build
#   - Automatic: push to main/master deploys the "Sefaria Staging" app
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  android-deploy:
    runs-on: ubuntu-latest   # Android builds don't need macOS — faster & cheaper

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        # gcloud is used by get_or_create_firebase_app.sh to authenticate
        # and call the Firebase Management API

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android   # install gems from android/Gemfile, not the root one

      - name: Install npm dependencies
        run: npm install

      - name: Install Firebase CLI
        # Firebase CLI is used by the testrelease lane to distribute the APK.
        # It handles first-time App Distribution app initialisation, which the
        # Fastlane plugin REST API cannot do for dynamically-created Firebase apps.
        run: npm install -g firebase-tools

      - name: Decode Android keystore
        # Gradle resolves ./upload-kstore.keystore relative to the :app subproject
        # directory (android/app/), not the root project (android/).
        # Decode to both locations so it works regardless of how the path resolves.
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-kstore.keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-kstore.keystore

      - name: Decode Firebase service account
        # Sets GOOGLE_APPLICATION_CREDENTIALS so get_or_create_firebase_app.sh
        # can authenticate with gcloud. The script activates the account itself —
        # no separate gcloud auth call needed here.
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" \
            | base64 --decode > /tmp/firebase-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json" >> $GITHUB_ENV

      - name: Create envvars.sh
        run: |
          echo "export SOURCE_SERVER=\"https://readonly.sefaria.org/\""  >> scripts/envvars.sh
          # update_sources.sh copies files to both ios/sources/ and android/app/…/sources/
          # from the same server path.  Only ios-export/ exists (android-export/ is a 404).
          echo "export SOURCE_UNIX_PATH=\"static/ios-export/\""           >> scripts/envvars.sh

      - name: List keystore (debug info)
        working-directory: android
        run: |
          echo "PWD = $(pwd)"
          file upload-kstore.keystore || true
          keytool -list -v \
            -keystore upload-kstore.keystore \
            -storepass "${{ secrets.STOREPASS }}" \
          || true

      - name: Run Fastlane
        working-directory: android
        run: |
          bundle exec fastlane android testrelease storepass:${{ secrets.STOREPASS }}

      - name: Commit updated source files
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage source JSON files so iOS builds (Fastlane or CI) use the same
          # snapshot that was bundled into the Android APK.  update_sources.sh
          # writes to both directories in a single run, so committing both here
          # replaces the manual "run Android then iOS from the same machine" flow.
          git add android/app/src/main/assets/sources/ ios/sources/ || true
          git add android/app/build.gradle
          if git diff --cached --quiet; then
            echo "No changes to commit; skipping"
          else
            git commit -m "ci: update source files [skip ci]"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/firebase-service-account.json android/upload-kstore.keystore android/app/upload-kstore.keystore

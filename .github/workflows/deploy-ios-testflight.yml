name: 🍎 Deploy iOS to TestFlight

# Manual trigger only — same pattern as the Android production release.
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 6.8.0). Leave blank to keep current.'
        required: false
        default: ''

jobs:
  ios-release:
    runs-on: macos-latest   # Xcode is macOS-only

    steps:
      - uses: actions/checkout@v4

      - name: Bump marketing version in Xcode project
        # Updates MARKETING_VERSION (the user-visible version, e.g. "6.8.0") in
        # project.pbxproj if the caller supplied a version_name input.
        # The build number (CURRENT_PROJECT_VERSION) is handled by
        # increment_build_number inside the Fastlane beta lane.
        # BSD sed (macOS) requires the empty string after -i.
        if: ${{ github.event.inputs.version_name != '' }}
        run: |
          INPUT="${{ github.event.inputs.version_name }}"
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = $INPUT/" \
            ios/ReaderApp.xcodeproj/project.pbxproj
          echo "📦 Marketing version → $INPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true   # reads from root Gemfile (contains fastlane + cocoapods)

      - name: Install npm dependencies
        run: npm install

      - name: Create envvars.sh
        run: |
          echo "export SOURCE_SERVER=\"https://readonly.sefaria.org/\"" >> scripts/envvars.sh
          echo "export SOURCE_UNIX_PATH=\"static/ios-export/\""          >> scripts/envvars.sh

      - name: Decode App Store Connect API key
        # Fastlane reads APP_STORE_CONNECT_API_KEY_KEY_FILEPATH automatically for
        # both match and upload_to_testflight — no separate api_key() call needed.
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" \
            | base64 --decode > /tmp/AuthKey.p8
          echo "APP_STORE_CONNECT_API_KEY_KEY_FILEPATH=/tmp/AuthKey.p8" >> $GITHUB_ENV

      - name: Run Fastlane beta
        env:
          # Match needs these to clone the private sefaria-ios-certs repo and
          # decrypt the certificate + provisioning profile.
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          # App Store Connect API key (key file path set above via GITHUB_ENV)
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: bundle exec fastlane ios beta

      - name: Commit build number bump and source files
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage the Xcode project (contains updated MARKETING_VERSION +
          # CURRENT_PROJECT_VERSION bumped by increment_build_number in the lane).
          git add ios/ReaderApp.xcodeproj/project.pbxproj
          # Stage source JSON files so the committed snapshot stays in sync.
          git add ios/sources/ android/app/src/main/assets/sources/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit; skipping"
          else
            VERSION=$(grep 'MARKETING_VERSION' ios/ReaderApp.xcodeproj/project.pbxproj \
              | head -1 | sed 's/.*= //;s/;//' | tr -d ' \r')
            BUILD=$(grep 'CURRENT_PROJECT_VERSION' ios/ReaderApp.xcodeproj/project.pbxproj \
              | head -1 | sed 's/.*= //;s/;//' | tr -d ' \r')
            git commit -m "ci: release iOS $VERSION (build $BUILD) [skip ci]"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/AuthKey.p8

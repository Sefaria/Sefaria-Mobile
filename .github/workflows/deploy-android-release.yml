name: 🚀 Deploy Android Production Release

# Manual trigger only — production releases should never run automatically.
# Must be run from master/main (enforced below).
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name to release, e.g. 6.8.0  (leave blank to keep current)'
        required: false
        default: ''

permissions:
  contents: write   # required for the bot commit + push after the build

jobs:
  android-release:
    runs-on: ubuntu-latest

    steps:
      # Use a PAT so the version-bump commit can be pushed back to the protected
      # master branch.  GITHUB_TOKEN is blocked by branch protection rules.
      # BOT_GITHUB_PAT must be a fine-grained token with Contents: Read+Write
      # and bypass rights configured in the branch protection rule.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_PAT }}

      - name: Verify branch is master/main
        # Prevent accidentally releasing a feature branch.
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          if [[ "$BRANCH" != "master" && "$BRANCH" != "main" ]]; then
            echo "❌ Production releases must run from master or main (got: $BRANCH)"
            exit 1
          fi

      - name: Bump version in build.gradle
        # Always increments VERSION_BUILD by 1.
        # If version_name was supplied (e.g. "6.8.0"), also updates MAJOR/MINOR/PATCH.
        run: |
          INPUT="${{ github.event.inputs.version_name }}"
          if [[ -n "$INPUT" ]]; then
            if ! [[ "$INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "❌ version_name must be MAJOR.MINOR.PATCH (e.g. 6.8.0), got: '$INPUT'"
              exit 1
            fi
            MAJOR=$(echo "$INPUT" | cut -d. -f1)
            MINOR=$(echo "$INPUT" | cut -d. -f2)
            PATCH=$(echo "$INPUT" | cut -d. -f3)
            sed -i "s/^def VERSION_MAJOR=.*/def VERSION_MAJOR=$MAJOR/" android/app/build.gradle
            sed -i "s/^def VERSION_MINOR=.*/def VERSION_MINOR=$MINOR/" android/app/build.gradle
            sed -i "s/^def VERSION_PATCH=.*/def VERSION_PATCH=$PATCH/" android/app/build.gradle
            echo "📦 Version name set to $MAJOR.$MINOR.$PATCH"
          fi
          # tr -d removes spaces and Windows-style \r that cut may leave on the value.
          CURRENT=$(grep '^def VERSION_BUILD=' android/app/build.gradle | cut -d= -f2 | tr -d ' \r')
          NEW_BUILD=$((CURRENT + 1))
          sed -i "s/^def VERSION_BUILD=.*/def VERSION_BUILD=$NEW_BUILD/" android/app/build.gradle
          echo "📦 VERSION_BUILD bumped: $CURRENT → $NEW_BUILD"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK components
        # ubuntu-latest has the SDK pre-installed at $ANDROID_HOME but sdkmanager
        # is not on PATH — use the full path to the cmdline-tools binary.
        # Explicitly install the versions pinned in android/build.gradle so builds
        # are deterministic regardless of what the runner image happens to include.
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android   # install gems from android/Gemfile, not root

      - name: Install npm dependencies
        run: npm install

      - name: Decode Android keystore
        # Gradle resolves ./upload-kstore.keystore relative to the :app subproject
        # directory (android/app/), not the root project (android/).
        # Decode to both locations so it works regardless of how the path resolves.
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-kstore.keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-kstore.keystore

      - name: Decode Google Play service account
        # The Appfile (android/fastlane/Appfile) points Fastlane to this exact path.
        # Same credential as PLAY_JSON_BASE64 used in the old deploy-android.yml.
        run: |
          echo "${{ secrets.PLAY_JSON_BASE64 }}" \
            | base64 --decode > android/keystores/production-deployment-a34193910650.json

      - name: Decode Google Services JSON
        # google-services.json is gitignored; decode the production config from a secret.
        # QA builds get a per-branch config downloaded by get_or_create_firebase_app.sh.
        # The release build uses the production package name (org.sefaria.sefaria) so it
        # needs the production google-services.json committed in this step.
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" \
            | base64 --decode > android/app/google-services.json

      - name: Create envvars.sh
        run: |
          echo "export SOURCE_SERVER=\"https://readonly.sefaria.org/\""  >> scripts/envvars.sh
          echo "export SOURCE_UNIX_PATH=\"static/ios-export/\""           >> scripts/envvars.sh

      - name: Run Fastlane release
        working-directory: android
        run: bundle exec fastlane android release storepass:${{ secrets.STOREPASS }}

      - name: Commit version bump and source files
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle
          git add android/app/src/main/assets/sources/ ios/sources/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit; skipping"
          else
            VNAME=$(grep -E '^def VERSION_(MAJOR|MINOR|PATCH)=' android/app/build.gradle \
              | awk -F'=' '{print $2}' | tr -d '\r' | tr '\n' '.' | sed 's/\.$//')
            VCODE=$(grep '^def VERSION_BUILD=' android/app/build.gradle \
              | cut -d= -f2 | tr -d ' \r')
            git commit -m "ci: release Android $VNAME (versionCode $VCODE) [skip ci]"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f android/keystores/production-deployment-a34193910650.json
          rm -f android/upload-kstore.keystore android/app/upload-kstore.keystore

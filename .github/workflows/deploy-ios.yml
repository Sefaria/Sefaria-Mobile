name: 🚀 Deploy iOS QA Build

on:
  workflow_dispatch:

permissions: {}

jobs:
  ios-deploy:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Install CocoaPods
        working-directory: ios
        run: |
          rm -rf Pods
          bundle exec pod install

      - name: Install distribution certificate
        run: |
          echo "${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}" | base64 --decode > /tmp/dist.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security import /tmp/dist.p12 -k build.keychain \
            -P "${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install provisioning profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Decode App Store Connect API key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > /tmp/AuthKey.p8

      - name: Decode GoogleService-Info.plist
        run: |
          echo "${{ secrets.IOS_GOOGLE_SERVICES_PLIST_BASE64 }}" | base64 --decode > ios/GoogleService-Info.plist

      - name: Create envvars.sh
        run: |
          echo "export SOURCE_SERVER=\"https://readonly.sefaria.org/\"" >> scripts/envvars.sh
          echo "export SOURCE_UNIX_PATH=\"static/ios-export/\""         >> scripts/envvars.sh

      - name: Run Fastlane
        run: |
          VERSION=$(grep -E '^def VERSION_(MAJOR|MINOR|PATCH)=' android/app/build.gradle \
            | awk -F'=' '{print $2}' | tr -d '\r' | tr '\n' '.' | sed 's/\.$//')
          bundle exec fastlane ios beta version_name:$VERSION
        env:
          APP_STORE_CONNECT_API_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

      - name: Print build log on failure
        if: failure()
        run: cat ~/Library/Logs/gym/*.log 2>/dev/null || echo "No gym log found"

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/dist.p12 /tmp/profile.mobileprovision /tmp/AuthKey.p8
          rm -f ios/GoogleService-Info.plist
          security delete-keychain build.keychain 2>/dev/null || true
          security list-keychains -d user -s login.keychain-db 2>/dev/null || true
